version: "3.9"

services:
  app:
    build: .
    container_name: jbb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - watchtower

  watchtower:
    image: containrrr/watchtower
    container_name: jbb-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 jbb-app
